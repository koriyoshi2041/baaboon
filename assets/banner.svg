<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="baaboon banner: sheep plus DNA helix plus baboon">
  <!-- ==== background ==== -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ec"/>
      <stop offset="1" stop-color="#ecf4ff"/>
    </linearGradient>
    <linearGradient id="dnaLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E69F00"/>
      <stop offset="1" stop-color="#D55E00"/>
    </linearGradient>
    <linearGradient id="dnaRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0072B2"/>
      <stop offset="1" stop-color="#009E73"/>
    </linearGradient>
  </defs>
  <rect width="900" height="280" fill="url(#bg)" rx="14"/>

  <!-- ==== title ==== -->
  <text x="450" y="52" text-anchor="middle"
        font-family="Georgia, 'DejaVu Serif', serif" font-size="44" font-weight="700"
        fill="#1f2933" letter-spacing="2">baaboon</text>
  <text x="450" y="78" text-anchor="middle"
        font-family="ui-monospace, 'DejaVu Sans Mono', monospace" font-size="11"
        fill="#425466">Papio × Ovis CRISPR design — grow primate organs in a sheep, then send them home.</text>

  <!-- ==== DNA double helix in the middle ==== -->
  <g transform="translate(380 110)">
    <!-- Left strand -->
    <path d="M0 0 Q 70 40 0 80 Q -70 120 0 160"
          stroke="url(#dnaLeft)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right strand -->
    <path d="M140 0 Q 70 40 140 80 Q 210 120 140 160"
          stroke="url(#dnaRight)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Rungs -->
    <g stroke="#6b7280" stroke-width="2" stroke-linecap="round">
      <line x1="22" y1="14" x2="118" y2="14"/>
      <line x1="38" y1="32" x2="102" y2="32"/>
      <line x1="46" y1="50" x2="94" y2="50"/>
      <line x1="46" y1="68" x2="94" y2="68"/>
      <line x1="38" y1="86" x2="102" y2="86"/>
      <line x1="22" y1="102" x2="118" y2="102"/>
      <line x1="22" y1="118" x2="118" y2="118"/>
      <line x1="38" y1="134" x2="102" y2="134"/>
      <line x1="46" y1="150" x2="94" y2="150"/>
    </g>
  </g>

  <!-- ==== sheep (left) ==== -->
  <g transform="translate(50 110)">
    <g stroke="#1f2933" stroke-width="2.2" stroke-linejoin="round" fill="#fafafa">
      <path d="M60 60
               c-6 -18 14 -30 28 -22
               c2 -16 24 -22 38 -10
               c8 -14 32 -12 40 4
               c18 -4 34 10 30 26
               c14 6 10 28 -6 30
               l-108 0
               c-18 0 -24 -16 -22 -28z"/>
      <circle cx="190" cy="68" r="10"/>
      <circle cx="70" cy="72" r="9"/>
    </g>
    <g fill="#1f2933" stroke="#1f2933" stroke-width="1.5" stroke-linejoin="round">
      <ellipse cx="48" cy="60" rx="16" ry="13"/>
      <path d="M38 45 q-6 -4 -2 -10 q6 2 4 10z"/>
      <path d="M58 46 q8 -6 4 -12 q-8 2 -4 12z"/>
    </g>
    <circle cx="43" cy="60" r="1.8" fill="#fafafa"/>
    <g stroke="#1f2933" stroke-width="3.2" stroke-linecap="round">
      <line x1="88" y1="90" x2="88" y2="118"/>
      <line x1="110" y1="94" x2="110" y2="118"/>
      <line x1="158" y1="94" x2="158" y2="118"/>
      <line x1="184" y1="90" x2="184" y2="118"/>
    </g>
    <circle cx="206" cy="62" r="4" fill="#fafafa" stroke="#1f2933" stroke-width="2"/>
    <text x="120" y="140"
          font-family="ui-monospace, 'DejaVu Sans Mono', monospace"
          font-size="10" text-anchor="middle" fill="#425466" font-style="italic">Ovis aries — host</text>
  </g>

  <!-- ==== baboon (right) ==== -->
  <g transform="translate(620 110)">
    <g stroke="#1f2933" stroke-width="2.2" stroke-linejoin="round" fill="#fafafa">
      <path d="M90 110
               q-14 0 -14 -18
               q-2 -22 10 -38
               q14 -16 36 -16
               q26 0 38 18
               q8 14 2 28
               q-4 12 -14 14
               q-8 14 -26 14
               l-32 -2z"/>
    </g>
    <g stroke="#1f2933" stroke-width="2.2" stroke-linejoin="round" fill="#fafafa">
      <path d="M30 42
               q-6 -14 4 -22
               q14 -10 40 -6
               q18 4 22 22
               q-2 14 -16 18
               q-20 6 -38 -2
               q-12 -4 -12 -10z"/>
      <path d="M58 20
               q-2 -22 22 -28
               q26 -6 40 10
               q8 10 2 20
               q-10 10 -28 12
               q-22 0 -36 -14z"/>
    </g>
    <path d="M98 10 q8 -2 10 6 q0 8 -8 8 q-4 -4 -2 -14z"
          fill="#fafafa" stroke="#1f2933" stroke-width="2"/>
    <path d="M56 24 q16 -6 34 -2" stroke="#1f2933" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="64" cy="32" r="2" fill="#1f2933"/>
    <circle cx="26" cy="38" r="1.2" fill="#1f2933"/>
    <path d="M24 50 q14 4 32 0" stroke="#1f2933" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M110 80 q12 -4 24 2 q8 6 6 16"
          stroke="#1f2933" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M174 100 q26 -6 32 -40 q2 -16 -8 -22"
          stroke="#1f2933" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <text x="120" y="140"
          font-family="ui-monospace, 'DejaVu Sans Mono', monospace"
          font-size="10" text-anchor="middle" fill="#425466" font-style="italic">Papio anubis — donor iPSC</text>
  </g>

  <!-- ==== bottom tagline ==== -->
  <text x="450" y="262" text-anchor="middle"
        font-family="Georgia, 'DejaVu Serif', serif" font-size="12" font-style="italic"
        fill="#6b7280">“Do baboons dream of electric sheep?”</text>
</svg>
