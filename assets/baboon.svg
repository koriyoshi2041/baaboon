<svg viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Minimal hand-drawn baboon, side profile sitting">
  <!-- Sitting body: larger rounded trunk -->
  <g stroke="#1f2933" stroke-width="2.2" stroke-linejoin="round" fill="#fafafa">
    <path d="M70 160
             q-10 0 -10 -20
             q-4 -34 18 -56
             q24 -22 60 -18
             q30 4 36 32
             q4 22 -16 30
             q-4 24 -38 30
             l-50 2z"/>
  </g>

  <!-- Head: dog-like elongated muzzle-forward skull -->
  <g stroke="#1f2933" stroke-width="2.2" stroke-linejoin="round" fill="#fafafa">
    <!-- Cranium -->
    <ellipse cx="110" cy="60" rx="28" ry="22"/>
    <!-- Muzzle protruding forward-left -->
    <path d="M84 66
             q-20 -4 -30 6
             q-6 8 0 16
             q8 8 22 8
             q16 2 24 -8
             q4 -8 -2 -14
             q-6 -6 -14 -8z"/>
  </g>

  <!-- Brow ridge -->
  <path d="M92 54 q16 -10 32 -6"
        stroke="#1f2933" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eye -->
  <circle cx="98" cy="60" r="2.4" fill="#1f2933"/>
  <!-- Nostril dot -->
  <circle cx="58" cy="78" r="1.5" fill="#1f2933"/>
  <!-- Mouth line -->
  <path d="M56 90 q16 4 28 0"
        stroke="#1f2933" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Ear (rounded tab on skull) -->
  <path d="M132 48 q10 -2 10 8 q0 10 -10 8z"
        fill="#fafafa" stroke="#1f2933" stroke-width="2"/>

  <!-- Front arm reaching down/forward -->
  <path d="M100 118 q-6 14 -14 22 q-4 10 2 18"
        stroke="#1f2933" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- Hand hint -->
  <circle cx="88" cy="158" r="4" fill="#fafafa" stroke="#1f2933" stroke-width="2"/>

  <!-- Folded leg -->
  <path d="M140 148 q20 0 30 -12"
        stroke="#1f2933" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- Tail curving up high -->
  <path d="M172 134 q38 -6 46 -50 q2 -18 -10 -22"
        stroke="#1f2933" stroke-width="2.4" fill="none" stroke-linecap="round"/>

  <!-- Species label -->
  <text x="130" y="176"
        font-family="ui-monospace, 'DejaVu Sans Mono', monospace"
        font-size="9" text-anchor="middle" fill="#1f2933" font-style="italic">Papio anubis</text>
</svg>
